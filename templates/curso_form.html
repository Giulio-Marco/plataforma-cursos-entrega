{% extends "base.html" %}

{% block title %}Novo Curso{% endblock %}

{% block content %}
<section class="section-head">
    <div>
        <p class="eyebrow">Publicacao</p>
        <h1>Criar novo curso</h1>
    </div>
</section>

<form method="POST" class="panel editor-form">
    <div class="field">
        <label for="titulo">Titulo do curso</label>
        <input id="titulo" type="text" name="titulo" placeholder="Ex.: Python do zero ao projeto" required>
    </div>

    <div class="field">
        <label for="categoria_id">Categoria</label>
        <select id="categoria_id" name="categoria_id" required>
            <option value="">Selecione</option>
            {% for categoria in categorias %}
                <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="field">
        <label for="nivel">Nivel</label>
        <select id="nivel" name="nivel" required>
            <option value="">Selecione</option>
            <option value="Iniciante">Iniciante</option>
            <option value="Intermediario">Intermediario</option>
            <option value="Avancado">Avancado</option>
        </select>
    </div>

    <div class="field">
        <label for="descricao">Descricao</label>
        <textarea id="descricao" name="descricao" rows="7" placeholder="Explique objetivo, publico e conteudo do curso." required></textarea>
    </div>

    <button type="submit" class="button">Salvar curso</button>
</form>
{% endblock %}
